<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汽车从右上角驶入中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #000;
            overflow: hidden;
            position: relative;
        }

        .car-container {
            position: absolute;
            top: 0;
            right: 0;
            width: 150px;
            height: auto;
            transform-origin: center center;
            animation: driveToCenter 5s ease-out forwards;
        }

        .car {
            width: 100%;
            height: auto;
            display: block;
        }

        @keyframes driveToCenter {
            0% {
                top: 0;
                right: 0;
                transform: scale(0.3) rotate(0deg);
            }
            100% {
                top: 50%;
                right: 50%;
                transform: scale(1) translate(50%, -50%) rotate(0deg);
            }
        }
    </style>
</head>
<body>
    <div class="car-container">
        < img src="https://i.imgur.com/K5wQkRq.jpg" alt="橙色跑车" class="car">
    </div>
</body>
</html>
